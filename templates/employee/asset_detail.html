{% extends "base.html" %}
{% block title %}资产详情 - IT 资产管理{% endblock %}
{% block content %}
<div id="assetDetail"><p>加载中...</p></div>
{% endblock %}
{% block scripts %}
<script>
const assetId = {{ asset_id }};
const statusLabels = {in_stock:'库存',assigned:'在用',maintenance:'维修中',scrapped:'已报废'};
const statusClasses = {in_stock:'badge-instock',assigned:'badge-assigned',maintenance:'badge-maintenance',scrapped:'badge-scrapped'};
const catLabels = {computer:'电脑',monitor:'显示器',phone:'手机',tablet:'平板',printer:'打印机',server:'服务器',network:'网络设备',firewall:'防火墙',switch:'交换机'};
const catIcons = {computer:'\u{1F4BB}',monitor:'\u{1F5A5}',phone:'\u{1F4F1}',tablet:'\u{1F4CB}',printer:'\u{1F5A8}',server:'\u{1F5C4}',network:'\u{1F310}',firewall:'\u{1F6E1}',switch:'\u{1F500}'};
const eventNames = {stock_in:'入库',assign:'分配',return:'归还',transfer:'转移',maintenance_start:'送修',maintenance_end:'维修完成',scrap:'报废',label_print:'打印标签'};

function text(value) {
    return value === null || value === undefined || value === '' ? '-' : value;
}

function makeRow(label, content) {
    const tr = document.createElement('tr');
    const th = document.createElement('th');
    th.textContent = label;
    const td = document.createElement('td');
    if (typeof content === 'string') {
        td.textContent = content;
    } else if (content) {
        td.appendChild(content);
    }
    tr.append(th, td);
    return tr;
}

async function loadDetail() {
    const root = document.getElementById('assetDetail');
    let data;
    try {
        data = await apiFetch(`/api/assets/${assetId}`);
    } catch (e) {
        root.replaceChildren();
        const p = document.createElement('p');
        p.className = 'error-text';
        p.textContent = '加载失败';
        root.appendChild(p);
        return;
    }
    root.replaceChildren();

    const h2 = document.createElement('h2');
    h2.textContent = data.asset_tag;
    root.appendChild(h2);

    const badge = document.createElement('span');
    badge.className = `badge ${statusClasses[data.status] || ''}`.trim();
    badge.textContent = statusLabels[data.status] || data.status;
    root.appendChild(badge);

    const catSpan = document.createElement('span');
    catSpan.textContent = `${catIcons[data.category] || ''} ${catLabels[data.category] || data.category}`.trim();

    const table = document.createElement('table');
    table.className = 'detail-table';
    table.appendChild(makeRow('名称', text(data.name)));
    table.appendChild(makeRow('类别', catSpan));
    table.appendChild(makeRow('品牌', text(data.brand)));
    table.appendChild(makeRow('型号', text(data.model)));
    table.appendChild(makeRow('序列号', text(data.serial_number)));
    table.appendChild(makeRow('位置', text(data.location)));
    table.appendChild(makeRow('备注', text(data.notes)));
    root.appendChild(table);

    const h3 = document.createElement('h3');
    h3.style.marginTop = '24px';
    h3.textContent = '生命周期时间线';
    root.appendChild(h3);

    if (data.events && data.events.length) {
        const timeline = document.createElement('div');
        timeline.className = 'timeline';
        data.events.forEach(e => {
            const item = document.createElement('div');
            item.className = 'timeline-item';
            const dot = document.createElement('div');
            dot.className = 'timeline-dot';
            const content = document.createElement('div');
            content.className = 'timeline-content';
            const title = document.createElement('div');
            title.className = 'timeline-title';
            title.textContent = eventNames[e.event_type] || e.event_type;
            const meta = document.createElement('div');
            meta.className = 'timeline-meta';
            meta.textContent = e.created_at ? new Date(e.created_at).toLocaleString('zh-CN') : '-';
            content.append(title, meta);
            item.append(dot, content);
            timeline.appendChild(item);
        });
        root.appendChild(timeline);
    } else {
        const empty = document.createElement('p');
        empty.className = 'text-muted';
        empty.textContent = '暂无生命周期事件';
        root.appendChild(empty);
    }

    const back = document.createElement('div');
    back.style.marginTop = '16px';
    const link = document.createElement('a');
    link.href = '/my/assets';
    link.className = 'btn btn-secondary';
    link.textContent = '返回我的资产';
    back.appendChild(link);
    root.appendChild(back);
}

loadDetail();
</script>
{% endblock %}
