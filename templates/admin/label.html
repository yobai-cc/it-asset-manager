<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产标签</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: sans-serif; padding: 20px; }
    .no-print { margin-bottom: 20px; }
    .label-card {
        width: 60mm; height: 40mm;
        border: 1px solid #ccc;
        padding: 2mm 3mm;
        display: inline-flex;
        flex-direction: row;
        align-items: center;
        background: white;
        margin: 3mm;
        page-break-inside: avoid;
        overflow: hidden;
    }
    .label-left {
        flex: 1;
        min-width: 0;
        overflow: hidden;
    }
    .label-logo {
        height: 5mm;
        margin-bottom: 1mm;
        object-fit: contain;
    }
    .label-asset-tag {
        font-size: 10pt;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .label-field {
        font-size: 6pt;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #333;
    }
    .label-right {
        flex-shrink: 0;
        margin-left: 2mm;
    }
    .label-qr { width: 20mm; height: 20mm; }
    @media print {
        .no-print { display: none !important; }
        body { background: white; padding: 0; margin: 0; }
        .label-card { border: 1px solid #000; margin: 0; }
    }
    </style>
</head>
<body>
    <div class="no-print">
        <button onclick="window.print()" style="padding:10px 20px;font-size:16px;">打印标签</button>
        <button onclick="window.close()" style="padding:10px 20px;font-size:16px;margin-left:10px;">关闭</button>
    </div>
    <div id="labelContent"></div>
    <script>
    const assetId = {{ asset_id }};
    const labelFieldLabels = {name:'名称',serial_number:'序列号',holder:'持有人',location:'位置',brand:'品牌',model:'型号'};
    Promise.all([
        fetch(`/api/assets/${assetId}`).then(r => r.json()),
        fetch('/api/settings/label').then(r => r.json()),
        fetch('/api/settings/logo').then(r => r.json()),
    ]).then(([data, settings, logoData]) => {
        const fields = settings.fields || ['name'];
        const logoUrl = logoData.logo || '';

        const card = document.createElement('div');
        card.className = 'label-card';

        const left = document.createElement('div');
        left.className = 'label-left';

        if (logoUrl) {
            const logo = document.createElement('img');
            logo.src = logoUrl;
            logo.className = 'label-logo';
            logo.alt = 'Logo';
            left.appendChild(logo);
        }

        const tag = document.createElement('div');
        tag.className = 'label-asset-tag';
        tag.textContent = data.asset_tag;
        left.appendChild(tag);

        fields.forEach(f => {
            const val = f === 'holder' ? (data.holder_name || '') : (data[f] || '');
            if (val) {
                const field = document.createElement('div');
                field.className = 'label-field';
                field.textContent = val;
                left.appendChild(field);
            }
        });

        const right = document.createElement('div');
        right.className = 'label-right';
        const qr = document.createElement('img');
        qr.src = `/api/assets/${assetId}/qr`;
        qr.className = 'label-qr';
        qr.alt = 'QR';
        right.appendChild(qr);

        card.appendChild(left);
        card.appendChild(right);
        document.getElementById('labelContent').replaceChildren(card);
    });
    </script>
</body>
</html>
