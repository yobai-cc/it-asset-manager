<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产标签</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; font-family: sans-serif; padding: 20px; }
    .no-print { margin-bottom: 20px; }
    .label-card {
        width: 60mm; height: 40mm;
        border: 1px solid #ccc;
        padding: 3mm;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: white;
        margin: 5mm;
        page-break-inside: avoid;
    }
    .label-asset-tag { font-size: 11pt; font-weight: bold; margin-bottom: 1mm; }
    .label-name { font-size: 8pt; margin-bottom: 1mm; text-align: center; }
    .label-qr { width: 22mm; height: 22mm; }
    @media print {
        .no-print { display: none !important; }
        body { background: white; padding: 0; }
        .label-card { border: 1px solid #000; margin: 0; }
    }
    </style>
</head>
<body>
    <div class="no-print">
        <button onclick="window.print()" style="padding:10px 20px;font-size:16px;">打印标签</button>
        <button onclick="window.close()" style="padding:10px 20px;font-size:16px;margin-left:10px;">关闭</button>
    </div>
    <div id="labelContent"></div>
    <script>
    const assetId = {{ asset_id }};
    fetch(`/api/assets/${assetId}`).then(r => r.json()).then(data => {
        document.getElementById('labelContent').innerHTML = `
            <div class="label-card">
                <div class="label-asset-tag">${data.asset_tag}</div>
                <div class="label-name">${data.name}</div>
                <img src="/api/assets/${assetId}/qr" class="label-qr" alt="QR Code">
            </div>
        `;
    });
    </script>
</body>
</html>
