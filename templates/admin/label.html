<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产标签</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; padding: 24px; color: #0f172a; }

    .no-print { margin-bottom: 16px; }
    .no-print p { color: #64748b; font-size: 13px; margin-bottom: 12px; }
    .no-print .print-actions { display: flex; gap: 8px; align-items: center; }
    .print-btn {
        height: 36px; padding: 0 16px; border-radius: 8px; border: 1px solid #e2e8f0;
        background: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .print-btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .print-hint {
        font-size: 12px; color: #64748b; padding: 8px 12px; background: #f1f5f9;
        border-radius: 6px; margin-top: 12px; line-height: 1.6;
    }

    /* ========== 标签主体 60×40mm ========== */
    .physical-label {
        width: 60mm;
        height: 40mm;
        padding: 2mm;
        box-sizing: border-box;
        background: #fff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        line-height: 1.15;
        color: #0f172a;
        position: relative;
        overflow: hidden;
    }
    /* 预览模式下加虚线框 */
    .label-screen-border {
        border: 1px dashed #94a3b8;
        border-radius: 4px;
        padding: 0;
        display: inline-block;
        background: #fff;
    }
    .label-screen-border .physical-label { border: none; }

    /* 上半区：Logo + 文字 */
    .label-top { display: flex; align-items: center; gap: 2mm; min-width: 0; }
    .label-logo-box {
        width: 11mm; height: 11mm;
        border: 0.3mm solid #e2e8f0; border-radius: 1mm;
        display: flex; align-items: center; justify-content: center;
        font-size: 4mm; font-weight: 900; color: #2563eb;
        flex-shrink: 0; overflow: hidden;
    }
    .label-logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .label-text { min-width: 0; overflow: hidden; flex: 1; }
    .label-text .name {
        font-size: 3.8mm; font-weight: 800;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .label-text .tag {
        font-size: 2.8mm; font-weight: 600; color: #2563eb;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .label-text .field {
        font-size: 2.5mm; color: #64748b;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        line-height: 1.3;
    }

    /* 下半区：数字编号 + QR 码 */
    .label-bottom { display: flex; align-items: flex-end; justify-content: space-between; }
    .label-number { font-size: 7mm; font-weight: 900; letter-spacing: 0.2mm; line-height: 1; }
    .label-qr-wrap {
        width: 20mm; height: 20mm;
        border: 0.3mm solid #e2e8f0; padding: 0.5mm;
        flex-shrink: 0;
    }
    .label-qr-wrap img { width: 100%; height: 100%; object-fit: contain; }

    /* 尺寸标注（仅预览） */
    .dim-indicator {
        position: absolute; color: #64748b; font-size: 10px; font-weight: 700;
        background: #fff; padding: 0 4px; pointer-events: none;
    }
    .dim-h { left: 50%; bottom: -16px; transform: translateX(-50%); }
    .dim-v { right: -26px; top: 50%; transform: translateY(-50%) rotate(90deg); }

    /* ========== 打印 ========== */
    @media print {
        html, body { margin: 0; padding: 0; background: #fff; width: auto; height: auto; overflow: hidden; }
        .no-print { display: none !important; }
        .label-screen-border { display: contents; }
        .dim-indicator { display: none !important; }
        .physical-label {
            width: 57.6mm;
            height: 37.6mm;
            margin: 1.1mm;
            padding: 2mm;
            border: none;
        }
        @page { size: 60mm 40mm; margin: 0; }
    }
    </style>
</head>
<body>
    <div class="no-print">
        <p>标签尺寸 60×40mm，含 QR 二维码，适配立象 Argox 热转印打印机 + 60×40mm 亚银纸。</p>
        <div class="print-actions">
            <button class="print-btn primary" type="button" onclick="window.print()">打印标签</button>
            <button class="print-btn" type="button" onclick="window.close()">关闭</button>
        </div>
        <div class="print-hint">
            打印前请在浏览器打印对话框中确认：<br>
            &bull; 目标打印机选择 Argox 打印机<br>
            &bull; 纸张大小 60&times;40mm（或自定义尺寸）<br>
            &bull; 缩放比例 100%（不要勾选「适应页面」）
        </div>
    </div>
    <div class="label-screen-border">
        <div class="physical-label" id="labelContent"></div>
    </div>
    <div class="dim-indicator dim-h">60mm</div>
    <div class="dim-indicator dim-v">40mm</div>

    <script>
    const assetId = {{ asset_id }};
    const fieldLabels = {name:'资产名称',serial_number:'序列号',holder:'持有人',location:'位置',brand:'品牌',model:'型号'};

    function el(tag, cls, text) {
        const n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text !== undefined && text !== null) n.textContent = text;
        return n;
    }

    function buildLabel(asset, fields, logoUrl) {
        const label = document.getElementById('labelContent');

        /* 上半区 */
        const top = el('div', 'label-top');
        const logoBox = el('div', 'label-logo-box');
        if (logoUrl) {
            const img = document.createElement('img');
            img.src = logoUrl; img.alt = 'Logo';
            logoBox.appendChild(img);
        } else {
            logoBox.textContent = 'IT';
        }
        const textWrap = el('div', 'label-text');
        if (fields.includes('name')) {
            textWrap.appendChild(el('div', 'name', asset.name || '-'));
        }
        textWrap.appendChild(el('div', 'tag', asset.asset_tag || '-'));
        fields.forEach(f => {
            if (f === 'name') return;
            const v = f === 'holder' ? asset.holder_name : asset[f];
            if (!v) return;
            const label = f === 'serial_number' ? 'SN' : (fieldLabels[f] || f);
            textWrap.appendChild(el('div', 'field', label + ': ' + v));
        });
        top.append(logoBox, textWrap);

        /* 下半区 */
        const bottom = el('div', 'label-bottom');
        const num = String(asset.asset_tag || asset.id || '').replace(/\D/g, '').slice(-7) || String(asset.id || '-');
        bottom.appendChild(el('div', 'label-number', num));
        const qrWrap = el('div', 'label-qr-wrap');
        const qr = document.createElement('img');
        qr.src = '/api/assets/' + assetId + '/qr';
        qr.alt = 'QR';
        qrWrap.appendChild(qr);
        bottom.appendChild(qrWrap);

        label.append(top, bottom);
        return label;
    }

    Promise.all([
        fetch('/api/assets/' + assetId).then(r => r.json()),
        fetch('/api/settings/label').then(r => r.json()),
        fetch('/api/settings/logo').then(r => r.json()),
    ]).then(([asset, settings, logoData]) => {
        buildLabel(asset, settings.fields || ['name', 'serial_number'], logoData.logo || '');
    });
    </script>
</body>
</html>
