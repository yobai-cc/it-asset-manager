<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产标签</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; padding: 24px; color: #0f172a; }

    .no-print { margin-bottom: 16px; }
    .no-print p { color: #64748b; font-size: 13px; margin-bottom: 12px; }
    .no-print .print-actions { display: flex; gap: 8px; align-items: center; }
    .print-btn {
        height: 36px; padding: 0 16px; border-radius: 8px; border: 1px solid #e2e8f0;
        background: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .print-btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .print-hint {
        font-size: 12px; color: #64748b; padding: 8px 12px; background: #f1f5f9;
        border-radius: 6px; margin-top: 12px; line-height: 1.6;
    }

    /* ========== 标签主体 60×40mm — 左右分栏 ========== */
    .physical-label {
        width: 60mm; height: 40mm;
        position: relative;
        background: #fff;
        overflow: hidden;
        line-height: 1.15;
        color: #0f172a;
    }
    .label-screen-border {
        border: 1px dashed #94a3b8; border-radius: 4px;
        padding: 0; display: inline-block; background: #fff;
    }
    .label-screen-border .physical-label { border: none; }

    /* --- Logo — top-left --- */
    .label-logo {
        position: absolute; left: 3mm; top: 3mm;
        max-width: 30mm; max-height: 7mm;
        overflow: hidden;
    }
    .label-logo img { max-width: 100%; max-height: 7mm; object-fit: contain; display: block; }
    .label-logo-fallback {
        font-size: 5.5mm; font-weight: 900; color: #2563eb; line-height: 1;
    }
    /* --- 分类 + 位置 row --- */
    .label-meta-row {
        position: absolute; left: 3mm; top: 13mm;
        display: flex; align-items: center; gap: 1.5mm;
    }
    .label-category {
        display: inline-block;
        font-size: 1.8mm; font-weight: 600; color: #2563eb;
        border: 0.3mm solid #2563eb; border-radius: 1mm;
        padding: 0.3mm 1.2mm; line-height: 1.3;
        flex-shrink: 0;
    }
    .label-location {
        font-size: 2.2mm; color: #64748b;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        max-width: 18mm;
    }
    .label-location:empty { display: none; }
    /* --- 左侧文字 --- */
    .label-name {
        position: absolute; left: 3mm; top: 18.5mm;
        width: 32mm;
        font-size: 3mm; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .label-brand {
        position: absolute; left: 3mm; top: 24mm;
        width: 32mm;
        font-size: 2.5mm; color: #64748b;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* --- 资产编号 — full width below QR zone --- */
    .label-tag {
        position: absolute; left: 3mm; top: 30mm;
        width: 54mm;
        font-size: 4mm; font-weight: 800; color: #0f172a;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        letter-spacing: 0.1mm;
    }

    /* --- 右上角 QR (20×20mm) --- */
    .label-qr {
        position: absolute; right: 3mm; top: 3mm;
        width: 20mm; height: 20mm;
        border: 0.3mm solid #e2e8f0; padding: 0.5mm;
    }
    .label-qr img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .label-qr-hint {
        position: absolute; right: 3mm; top: 23.5mm;
        width: 20mm;
        font-size: 1.6mm; color: #94a3b8;
        text-align: center;
    }

    /* 尺寸标注（仅预览） */
    .dim-indicator {
        position: absolute; color: #64748b; font-size: 10px; font-weight: 700;
        background: #fff; padding: 0 4px; pointer-events: none;
    }
    .dim-h { left: 50%; bottom: -16px; transform: translateX(-50%); }
    .dim-v { right: -26px; top: 50%; transform: translateY(-50%) rotate(90deg); }

    /* ========== 打印 ========== */
    @media print {
        html, body { margin: 0; padding: 0; background: #fff; width: auto; height: auto; overflow: hidden; }
        .no-print { display: none !important; }
        .label-screen-border { display: contents; }
        .dim-indicator { display: none !important; }
        .physical-label {
            width: 57.6mm; height: 37.6mm;
            margin: 1.1mm; border: none;
            transform-origin: top left;
            transform: scale(0.96);
        }
        @page { size: 60mm 40mm; margin: 0; }
    }
    </style>
</head>
<body>
    <div class="no-print">
        <p>标签尺寸 60×40mm，含 QR 二维码，适配立象 Argox 热转印打印机 + 60×40mm 亚银纸。</p>
        <div class="print-actions">
            <button class="print-btn primary" type="button" onclick="window.print()">打印标签</button>
            <button class="print-btn" type="button" onclick="window.close()">关闭</button>
        </div>
        <div class="print-hint">
            打印前请在浏览器打印对话框中确认：<br>
            &bull; 目标打印机选择 Argox 打印机<br>
            &bull; 纸张大小 60&times;40mm（或自定义尺寸）<br>
            &bull; 缩放比例 100%（不要勾选「适应页面」）
        </div>
    </div>
    <div class="label-screen-border">
        <div class="physical-label" id="labelContent"></div>
    </div>
    <div class="dim-indicator dim-h">60mm</div>
    <div class="dim-indicator dim-v">40mm</div>

    <script>
    const assetId = {{ asset_id }};
    var catNames = {
        computer:'电脑', monitor:'显示器', phone:'手机', tablet:'平板',
        printer:'打印机', server:'服务器', network:'网络设备', firewall:'防火墙', switch:'交换机'
    };

    function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text !== undefined && text !== null) n.textContent = text;
        return n;
    }

    function buildLabel(asset, fields, logoUrl) {
        fields = Array.isArray(fields) ? fields : [];
        var showLocation = fields.includes('location');
        var label = document.getElementById('labelContent');

        /* Logo */
        var logoEl = el('div', 'label-logo');
        if (logoUrl) {
            var img = document.createElement('img');
            img.src = logoUrl; img.alt = 'Logo';
            logoEl.appendChild(img);
        } else {
            logoEl.appendChild(el('span', 'label-logo-fallback', 'IT'));
        }

        /* 固定文字行 */
        var nameEl = el('div', 'label-name', asset.name || '-');

        var brandParts = [asset.brand, asset.model].filter(Boolean).join(' / ') || '-';
        var brandEl = el('div', 'label-brand', brandParts);

        var tagEl = el('div', 'label-tag', asset.asset_tag || '-');

        var catLabel = catNames[asset.category] || asset.category || '';
        var catEl = el('div', 'label-category', catLabel);
        var metaRow = el('div', 'label-meta-row');
        metaRow.appendChild(catEl);
        if (showLocation && asset.location) {
            var locationEl = el('span', 'label-location', asset.location);
            metaRow.appendChild(locationEl);
        }

        /* QR 码 */
        var qrEl = el('div', 'label-qr');
        var qrImg = document.createElement('img');
        qrImg.src = '/api/assets/' + assetId + '/qr';
        qrImg.alt = 'QR';
        qrEl.appendChild(qrImg);

        var qrHint = el('div', 'label-qr-hint', '扫码查看');

        label.append(logoEl, metaRow, nameEl, brandEl, tagEl, qrEl, qrHint);
        return label;
    }

    Promise.all([
        fetch('/api/assets/' + assetId).then(function(r) { return r.json(); }),
        fetch('/api/settings/label').then(function(r) { return r.json(); }),
        fetch('/api/settings/logo').then(function(r) { return r.json(); }),
    ]).then(function(args) {
        var asset = args[0];
        var settings = args[1];
        var logoData = args[2];
        buildLabel(asset, settings.fields || [], logoData.logo || '');
    });
    </script>
</body>
</html>
