{% extends "base.html" %}
{% block title %}资产详情 - IT 资产管理{% endblock %}
{% block content %}
<div id="assetDetail">
    <p>加载中...</p>
</div>

<!-- 分配对话框 -->
<div id="assignModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>分配资产</h3>
        <div class="form-group">
            <label>选择领用人</label>
            <select id="assignUser" class="input"></select>
        </div>
        <div class="form-group">
            <label>备注</label>
            <input type="text" id="assignNotes" class="input">
        </div>
        <button class="btn btn-primary" onclick="doAssign()">确认分配</button>
        <button class="btn btn-secondary" onclick="closeModal('assignModal')">取消</button>
    </div>
</div>

<!-- 转移对话框 -->
<div id="transferModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>转移资产</h3>
        <div class="form-group">
            <label>选择接收人</label>
            <select id="transferUser" class="input"></select>
        </div>
        <div class="form-group">
            <label>备注</label>
            <input type="text" id="transferNotes" class="input">
        </div>
        <button class="btn btn-primary" onclick="doTransfer()">确认转移</button>
        <button class="btn btn-secondary" onclick="closeModal('transferModal')">取消</button>
    </div>
</div>

<!-- 维修对话框 -->
<div id="maintenanceModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>送修</h3>
        <div class="form-group">
            <label>故障描述 *</label>
            <textarea id="maintenanceDesc" class="input" rows="3"></textarea>
        </div>
        <button class="btn btn-primary" onclick="doMaintenance()">确认送修</button>
        <button class="btn btn-secondary" onclick="closeModal('maintenanceModal')">取消</button>
    </div>
</div>

<!-- 报废对话框 -->
<div id="scrapModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>报废资产</h3>
        <p>确定要报废此资产吗？此操作不可逆。</p>
        <div class="form-group">
            <label>备注</label>
            <textarea id="scrapNotes" class="input" rows="2"></textarea>
        </div>
        <button class="btn btn-danger" onclick="doScrap()">确认报废</button>
        <button class="btn btn-secondary" onclick="closeModal('scrapModal')">取消</button>
    </div>
</div>

<!-- 维修完成对话框 -->
<div id="resolveModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>维修完成</h3>
        <input type="hidden" id="resolveRecordId">
        <div class="form-group">
            <label>维修费用</label>
            <input type="number" step="0.01" id="resolveCost" class="input">
        </div>
        <div class="form-group">
            <label>维修备注</label>
            <textarea id="resolveNotes" class="input" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="resolveReturnStock"> 归还库存（而非回到原持有人）</label>
        </div>
        <button class="btn btn-primary" onclick="doResolve()">确认完成</button>
        <button class="btn btn-secondary" onclick="closeModal('resolveModal')">取消</button>
    </div>
</div>

<!-- 归还对话框 -->
<div id="returnModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>归还资产</h3>
        <div class="form-group">
            <label>备注</label>
            <input type="text" id="returnNotes" class="input">
        </div>
        <button class="btn btn-primary" onclick="doReturn()">确认归还</button>
        <button class="btn btn-secondary" onclick="closeModal('returnModal')">取消</button>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const assetId = {{ asset_id }};
const statusLabels = {in_stock:'库存',assigned:'在用',maintenance:'维修中',scrapped:'已报废'};
const statusClasses = {in_stock:'badge-instock',assigned:'badge-assigned',maintenance:'badge-maintenance',scrapped:'badge-scrapped'};
const catLabels = {computer:'电脑',monitor:'显示器',phone:'手机',tablet:'平板',printer:'打印机',server:'服务器',network:'网络设备',firewall:'防火墙',switch:'交换机'};
const catIcons = {computer:'\u{1F4BB}',monitor:'\u{1F5A5}',phone:'\u{1F4F1}',tablet:'\u{1F4CB}',printer:'\u{1F5A8}',server:'\u{1F5C4}',network:'\u{1F310}',firewall:'\u{1F6E1}',switch:'\u{1F500}'};
const eventNames = {stock_in:'入库',assign:'分配',return:'归还',transfer:'转移',maintenance_start:'送修',maintenance_end:'维修完成',scrap:'报废',label_print:'打印标签'};

function makeEl(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = text;
    return node;
}

function makeDetailRow(label, valueNode) {
    const tr = document.createElement('tr');
    const th = makeEl('th', '', label);
    const td = document.createElement('td');
    if (typeof valueNode === 'string' || valueNode === undefined || valueNode === null) {
        td.textContent = valueNode || '-';
    } else {
        td.appendChild(valueNode);
    }
    tr.append(th, td);
    return tr;
}

async function loadDetail() {
    const data = await apiFetch(`/api/assets/${assetId}`);
    const el = document.getElementById('assetDetail');
    el.replaceChildren();

    const header = makeEl('div', 'detail-header');
    header.appendChild(makeEl('h2', '', `${data.asset_tag} - ${data.name}`));
    const statusBadge = makeEl('span', `badge ${statusClasses[data.status] || ''}`, statusLabels[data.status] || data.status);
    header.appendChild(statusBadge);

    const actions = makeEl('div', 'detail-actions');
    function addActionBtn(label, cls, onclick) {
        const btn = makeEl('button', `btn ${cls}`, label);
        btn.type = 'button';
        btn.addEventListener('click', onclick);
        actions.appendChild(btn);
    }
    function addActionLink(label, cls, href, target) {
        const a = makeEl('a', `btn ${cls}`, label);
        a.href = href;
        if (target) a.target = target;
        actions.appendChild(a);
    }
    if (data.status === 'in_stock') addActionBtn('分配', 'btn-primary', () => openModal('assignModal'));
    if (data.status === 'assigned') {
        addActionBtn('归还', 'btn-secondary', () => openModal('returnModal'));
        addActionBtn('转移', 'btn-secondary', () => openModal('transferModal'));
        addActionBtn('送修', 'btn-warning', () => openModal('maintenanceModal'));
    }
    if (data.status === 'maintenance') addActionBtn('维修完成', 'btn-primary', () => openResolveModal());
    if (data.status !== 'scrapped') addActionBtn('报废', 'btn-danger', () => openModal('scrapModal'));
    addActionLink('打印标签', 'btn-secondary', `/assets/${assetId}/label`, '_blank');
    addActionLink('编辑', 'btn-secondary', `/assets/${assetId}/edit`);

    const infoSection = makeEl('div', 'detail-section');
    infoSection.appendChild(makeEl('h3', '', '基本信息'));
    const infoTable = makeEl('table', 'detail-table');
    const categoryTd = document.createElement('td');
    categoryTd.textContent = `${catIcons[data.category]||''} ${catLabels[data.category]||data.category}`;
    infoTable.appendChild(makeDetailRow('类别', null)).querySelector('td').replaceWith(categoryTd);
    infoTable.appendChild(makeDetailRow('品牌', data.brand));
    infoTable.appendChild(makeDetailRow('型号', data.model));
    infoTable.appendChild(makeDetailRow('序列号', data.serial_number));
    infoTable.appendChild(makeDetailRow('持有人', data.holder_name));
    infoTable.appendChild(makeDetailRow('位置', data.location));
    infoTable.appendChild(makeDetailRow('购入日期', data.purchase_date));
    infoTable.appendChild(makeDetailRow('购入价格', data.purchase_price ? '¥' + data.purchase_price : '-'));
    if (data.warranty_date) {
        const warrantyTd = document.createElement('td');
        if (new Date(data.warranty_date) < new Date()) {
            const expiredBadge = makeEl('span', 'badge badge-scrapped', '已过期');
            warrantyTd.append(expiredBadge, ' ');
        }
        warrantyTd.appendChild(document.createTextNode(data.warranty_date));
        const warrantyRow = makeDetailRow('保修到期', null);
        warrantyRow.querySelector('td').replaceWith(warrantyTd);
        infoTable.appendChild(warrantyRow);
    } else {
        infoTable.appendChild(makeDetailRow('保修到期', '-'));
    }
    infoTable.appendChild(makeDetailRow('备注', data.notes));
    infoSection.appendChild(infoTable);

    const timelineSection = makeEl('div', 'detail-section');
    timelineSection.appendChild(makeEl('h3', '', '生命周期时间线'));
    if (data.events && data.events.length) {
        const timeline = makeEl('div', 'timeline');
        data.events.forEach(e => {
            const item = makeEl('div', 'timeline-item');
            item.appendChild(makeEl('div', 'timeline-dot'));
            const content = makeEl('div', 'timeline-content');
            content.appendChild(makeEl('div', 'timeline-title', eventNames[e.event_type] || e.event_type));
            const parts = [new Date(e.created_at).toLocaleString('zh-CN'), e.operator_name || '', e.notes || ''].filter(Boolean);
            content.appendChild(makeEl('div', 'timeline-meta', parts.join(' · ')));
            item.appendChild(content);
            timeline.appendChild(item);
        });
        timelineSection.appendChild(timeline);
    } else {
        timelineSection.appendChild(makeEl('p', 'text-muted', '暂无生命周期事件'));
    }

    const maintSection = makeEl('div', 'detail-section');
    maintSection.appendChild(makeEl('h3', '', '维修记录'));
    const maintStatusMap = {pending:'待处理', in_progress:'进行中', resolved:'已完成'};
    if (data.maintenance_records && data.maintenance_records.length) {
        const maintTable = makeEl('table', 'table');
        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');
        ['日期','描述','状态','费用','备注'].forEach(t => headRow.appendChild(makeEl('th','',t)));
        thead.appendChild(headRow);
        maintTable.appendChild(thead);
        const tbody = document.createElement('tbody');
        data.maintenance_records.forEach(m => {
            const tr = document.createElement('tr');
            tr.appendChild(makeEl('td', '', new Date(m.created_at).toLocaleDateString('zh-CN')));
            tr.appendChild(makeEl('td', '', m.description));
            tr.appendChild(makeEl('td', '', maintStatusMap[m.status] || m.status));
            tr.appendChild(makeEl('td', '', m.cost || '-'));
            tr.appendChild(makeEl('td', '', m.repair_notes || '-'));
            tbody.appendChild(tr);
        });
        maintTable.appendChild(tbody);
        maintSection.appendChild(maintTable);
    } else {
        maintSection.appendChild(makeEl('p', 'text-muted', '暂无维修记录'));
    }

    el.append(header, actions, infoSection, timelineSection, maintSection);

    // 加载用户列表用于分配/转移
    const usersRes = await apiFetch('/api/stats');
    // 从 API 获取用户 - 简化: 从维护记录中取
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

async function loadUsers(selectId) {
    const sel = document.getElementById(selectId);
    if (sel.options.length > 1) return;
    // 简化：从 my/assets 借助已有数据，实际应加 /api/users 端点
    // 临时方案：直接从数据库端查询
    const res = await fetch('/api/users');
    if (!res.ok) return;
    const data = await res.json();
    sel.innerHTML = '<option value="">请选择</option>';
    data.users.forEach(u => {
        sel.innerHTML += `<option value="${u.id}">${u.name} (${u.employee_id})</option>`;
    });
}

async function doAssign() {
    const uid = document.getElementById('assignUser').value;
    const notes = document.getElementById('assignNotes').value;
    await apiFetch(`/api/assets/${assetId}/assign`, {method:'POST', body:JSON.stringify({target_user_id:parseInt(uid), notes})});
    closeModal('assignModal');
    loadDetail();
}

async function doReturn() {
    const notes = document.getElementById('returnNotes').value;
    await apiFetch(`/api/assets/${assetId}/return`, {method:'POST', body:JSON.stringify({notes})});
    closeModal('returnModal');
    loadDetail();
}

async function doTransfer() {
    const uid = document.getElementById('transferUser').value;
    const notes = document.getElementById('transferNotes').value;
    await apiFetch(`/api/assets/${assetId}/transfer`, {method:'POST', body:JSON.stringify({target_user_id:parseInt(uid), notes})});
    closeModal('transferModal');
    loadDetail();
}

async function doMaintenance() {
    const desc = document.getElementById('maintenanceDesc').value;
    await apiFetch(`/api/assets/${assetId}/maintenance`, {method:'POST', body:JSON.stringify({description:desc})});
    closeModal('maintenanceModal');
    loadDetail();
}

async function doScrap() {
    const notes = document.getElementById('scrapNotes').value;
    await apiFetch(`/api/assets/${assetId}/scrap`, {method:'POST', body:JSON.stringify({notes})});
    closeModal('scrapModal');
    loadDetail();
}

function openResolveModal() {
    // 找到最近的 in_progress 维修记录
    openModal('resolveModal');
}

async function doResolve() {
    const cost = document.getElementById('resolveCost').value;
    const notes = document.getElementById('resolveNotes').value;
    const returnStock = document.getElementById('resolveReturnStock').checked;
    // 获取维修记录 ID
    const data = await apiFetch(`/api/assets/${assetId}`);
    const record = data.maintenance_records.find(r => r.status === 'in_progress');
    if (!record) { alert('未找到进行中的维修记录'); return; }
    await apiFetch(`/api/assets/${assetId}/maintenance/${record.id}/resolve`, {
        method:'POST', body:JSON.stringify({cost:cost?parseFloat(cost):null, repair_notes:notes, return_to_stock:returnStock}),
    });
    closeModal('resolveModal');
    loadDetail();
}

// 暴露 loadUsers 供 modal 打开时调用
document.getElementById('assignModal').addEventListener('click', () => loadUsers('assignUser'));
document.getElementById('transferModal').addEventListener('click', () => loadUsers('transferUser'));

loadDetail();
</script>
{% endblock %}
