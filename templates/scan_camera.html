{% extends "base.html" %}
{% block title %}扫码查资产 - IT 资产管理{% endblock %}
{% block content %}
<h2>扫码查资产</h2>

<div id="scanArea" style="max-width:400px;margin:0 auto;">
    <div id="reader" style="width:100%;"></div>
    <p id="scanStatus" style="text-align:center;margin-top:12px;color:var(--text-muted);">正在启动摄像头...</p>
</div>

<!-- 拍照扫码降级区（HTTP 下自动显示） -->
<div id="photoScanArea" style="display:none;max-width:400px;margin:0 auto;text-align:center;">
    <div style="border:2px dashed var(--color-border);border-radius:var(--radius-medium);padding:var(--space-4);cursor:pointer;"
         onclick="document.getElementById('photoInput').click()">
        <div style="font-size:48px;margin-bottom:8px;">📷</div>
        <p style="font-weight:500;">点击拍照扫码</p>
        <p style="color:var(--color-text-muted);font-size:14px;">对准资产二维码拍照即可识别</p>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment"
           style="display:none;" onchange="handlePhotoScan(this)">
    <p id="photoStatus" style="margin-top:12px;color:var(--color-text-muted);display:none;">正在识别...</p>
</div>

<div id="scanError" style="display:none;max-width:400px;margin:0 auto;text-align:center;">
    <p style="color:var(--danger);margin-bottom:12px;" id="scanErrorMsg"></p>
</div>

<div style="max-width:400px;margin:24px auto 0;">
    <div class="form-group">
        <label>手动输入资产标签号</label>
        <div style="display:flex;gap:8px;">
            <input type="text" id="manualTag" class="input" placeholder="如 PC-2026-0001">
            <button class="btn btn-primary" onclick="searchByTag()">查询</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
function onScanSuccess(decodedText) {
    const match = decodedText.match(/\/scan\/(\d+)/) || decodedText.match(/\/assets\/(\d+)/);
    if (match) {
        location.href = '/scan/' + match[1];
        return;
    }
    if (/^[A-Z]+-\d{4}-\d{4}$/.test(decodedText.trim())) {
        lookupByTag(decodedText.trim());
        return;
    }
    if (!decodedText.startsWith('http')) {
        const statusEl = document.getElementById('scanStatus');
        statusEl.textContent = '扫描内容非资产二维码：' + decodedText.substring(0, 50);
        statusEl.style.color = 'var(--warning)';
        return;
    }
    try {
        const url = new URL(decodedText, window.location.origin);
        if (url.origin !== window.location.origin) {
            const statusEl = document.getElementById('scanStatus');
            statusEl.textContent = '二维码指向外部地址，已拦截跳转：' + url.hostname;
            statusEl.style.color = 'var(--danger)';
            return;
        }
        location.href = decodedText;
    } catch(e) {
        const statusEl = document.getElementById('scanStatus');
        statusEl.textContent = '无法识别的二维码内容';
        statusEl.style.color = 'var(--warning)';
    }
}

function onScanFailure() {}

function onScanStarted() {
    document.getElementById('scanStatus').textContent = '请将二维码对准摄像头';
}

function onScanError(err) {
    // 摄像头不可用时，切换到拍照扫码模式
    document.getElementById('scanArea').style.display = 'none';
    document.getElementById('photoScanArea').style.display = 'block';

    const errEl = document.getElementById('scanErrorMsg');
    const errDiv = document.getElementById('scanError');
    const msg = String(err);
    if (msg.includes('NotAllowed') || msg.includes('Permission')) {
        errEl.textContent = '摄像头权限被拒绝，已切换为拍照扫码模式。';
        errDiv.style.display = 'block';
    } else if (msg.includes('NotFound') || msg.includes('device not found')) {
        errEl.textContent = '未检测到摄像头设备，请使用拍照或手动输入。';
        errDiv.style.display = 'block';
    }
    // 其他错误（如 HTTP 环境下 getUserMedia 被拦截）静默切换，不显示错误
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess,
    onScanFailure
).then(onScanStarted).catch(onScanError);

function handlePhotoScan(input) {
    if (!input.files || !input.files[0]) return;
    const statusEl = document.getElementById('photoStatus');
    statusEl.style.display = 'block';
    statusEl.textContent = '正在识别...';
    statusEl.style.color = 'var(--color-text-muted)';

    html5QrCode.scanFile(input.files[0], true)
        .then(function(decodedText) {
            onScanSuccess(decodedText);
        })
        .catch(function(err) {
            statusEl.textContent = '未识别到二维码，请重新拍照。确保二维码清晰完整。';
            statusEl.style.color = 'var(--danger)';
        });
    input.value = '';
}

async function lookupByTag(tag) {
    const statusEl = document.getElementById('scanStatus') || document.getElementById('photoStatus');
    try {
        const res = await fetch('/api/public/asset-lookup?asset_tag=' + encodeURIComponent(tag));
        const data = await res.json();
        if (res.ok && data.id) {
            location.href = '/scan/' + data.id;
        } else {
            statusEl.textContent = '未找到标签号「' + tag + '」对应的资产，请检查编号是否正确';
            statusEl.style.color = 'var(--danger)';
        }
    } catch(e) {
        statusEl.textContent = '网络请求失败，请检查网络后重试';
        statusEl.style.color = 'var(--danger)';
    }
}

async function searchByTag() {
    const tag = document.getElementById('manualTag').value.trim();
    const statusEl = document.getElementById('scanStatus') || document.getElementById('photoStatus');
    if (!tag) {
        statusEl.textContent = '请输入资产标签号（如 PC-2026-0001）';
        statusEl.style.color = 'var(--warning)';
        return;
    }
    statusEl.textContent = '正在查询...';
    statusEl.style.color = '';
    await lookupByTag(tag);
}
</script>
{% endblock %}
