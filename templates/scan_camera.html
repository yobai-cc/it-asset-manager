{% extends "base.html" %}
{% block title %}扫码查资产 - IT 资产管理{% endblock %}
{% block content %}
<h2>扫码查资产</h2>

<div id="scanArea" style="max-width:400px;margin:0 auto;">
    <div id="reader" style="width:100%;"></div>
    <p id="scanStatus" style="text-align:center;margin-top:12px;color:var(--text-muted);">正在启动摄像头...</p>
    <div id="scanError" style="display:none;text-align:center;margin-top:12px;">
        <p style="color:var(--danger);margin-bottom:12px;" id="scanErrorMsg"></p>
        <a href="/my/assets" class="btn btn-secondary">返回我的资产</a>
    </div>
</div>

<div id="manualInput" style="max-width:400px;margin:24px auto 0;">
    <div class="form-group">
        <label>手动输入资产标签号</label>
        <div style="display:flex;gap:8px;">
            <input type="text" id="manualTag" class="input" placeholder="如 PC-2026-0001">
            <button class="btn btn-primary" onclick="searchByTag()">查询</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
function onScanSuccess(decodedText) {
    const match = decodedText.match(/\/scan\/(\d+)/) || decodedText.match(/\/assets\/(\d+)/);
    if (match) {
        location.href = '/scan/' + match[1];
        return;
    }
    if (/^[A-Z]+-\d{4}-\d{4}$/.test(decodedText.trim())) {
        lookupByTag(decodedText.trim());
        return;
    }
    if (!decodedText.startsWith('http')) {
        const statusEl = document.getElementById('scanStatus');
        statusEl.textContent = '扫描内容非资产二维码：' + decodedText.substring(0, 50);
        statusEl.style.color = 'var(--warning)';
        return;
    }
    try {
        const url = new URL(decodedText, window.location.origin);
        if (url.origin !== window.location.origin) {
            const statusEl = document.getElementById('scanStatus');
            statusEl.textContent = '二维码指向外部地址，已拦截跳转：' + url.hostname;
            statusEl.style.color = 'var(--danger)';
            return;
        }
        location.href = decodedText;
    } catch(e) {
        const statusEl = document.getElementById('scanStatus');
        statusEl.textContent = '无法识别的二维码内容';
        statusEl.style.color = 'var(--warning)';
    }
}

function onScanFailure() {
    // 静默，持续扫描
}

function onScanStarted() {
    document.getElementById('scanStatus').textContent = '请将二维码对准摄像头';
}

function onScanError(err) {
    const msg = String(err);
    document.getElementById('scanArea').style.display = 'none';
    document.getElementById('scanError').style.display = 'block';
    const errEl = document.getElementById('scanErrorMsg');
    if (msg.includes('NotAllowed') || msg.includes('Permission')) {
        errEl.textContent = '摄像头权限被拒绝。请在浏览器地址栏左侧点击图标，允许摄像头访问后刷新页面。';
    } else if (msg.includes('NotFound') || msg.includes('device not found')) {
        errEl.textContent = '未检测到摄像头设备。请确认设备配有摄像头，或使用下方手动输入。';
    } else {
        errEl.textContent = '摄像头启动失败。请检查摄像头是否正常，或使用下方手动输入。';
    }
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess,
    onScanFailure
).then(onScanStarted).catch(onScanError);

function renderResult(asset, tag) {
    const statusLabels = {in_stock:'库存',assigned:'在用',maintenance:'维修中',scrapped:'已报废'};
    const statusClasses = {in_stock:'badge-instock',assigned:'badge-assigned',maintenance:'badge-maintenance',scrapped:'badge-scrapped'};
    const catLabels = {computer:'电脑',monitor:'显示器',phone:'手机',tablet:'平板',printer:'打印机',server:'服务器',network:'网络设备',firewall:'防火墙',switch:'交换机'};
    const catIcons = {computer:'\u{1F4BB}',monitor:'\u{1F5A5}',phone:'\u{1F4F1}',tablet:'\u{1F4CB}',printer:'\u{1F5A8}',server:'\u{1F5C4}',network:'\u{1F310}',firewall:'\u{1F6E1}',switch:'\u{1F500}'};
    const el = document.getElementById('scanStatus');
    const card = document.createElement('div');
    card.className = 'scan-card';

    const tagEl = document.createElement('div');
    tagEl.className = 'scan-tag';
    tagEl.textContent = `${catIcons[asset.category] || ''} ${asset.asset_tag}`.trim();
    card.appendChild(tagEl);

    const nameEl = document.createElement('div');
    nameEl.className = 'scan-name';
    nameEl.textContent = asset.name;
    card.appendChild(nameEl);

    const statusWrap = document.createElement('div');
    statusWrap.className = 'scan-status';
    const badge = document.createElement('span');
    badge.className = `badge ${statusClasses[asset.status] || ''}`.trim();
    badge.textContent = statusLabels[asset.status] || asset.status;
    statusWrap.appendChild(badge);
    card.appendChild(statusWrap);

    const meta = document.createElement('div');
    meta.className = 'scan-meta';
    if (asset.brand) {
        const brandLine = document.createElement('div');
        brandLine.textContent = asset.brand + (asset.model ? ' ' + asset.model : '');
        meta.appendChild(brandLine);
    }
    const categoryLine = document.createElement('div');
    categoryLine.textContent = '分类：' + (catLabels[asset.category] || asset.category);
    meta.appendChild(categoryLine);
    const locationLine = document.createElement('div');
    locationLine.textContent = '位置：' + (asset.location || '-');
    meta.appendChild(locationLine);
    card.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'scan-card login-prompt';
    actions.innerHTML = '<p class="text-muted" style="margin-bottom:12px;">登录后可查看更多信息和操作</p><a href="/login" class="btn btn-primary btn-block">登录</a>';
    card.appendChild(actions);

    const title = document.createElement('div');
    title.className = 'scan-header';
    title.textContent = 'IT 资产管理';

    const wrapper = document.getElementById('scanContent');
    wrapper.replaceChildren(title, card);
}

async function lookupByTag(tag) {
    const statusEl = document.getElementById('scanStatus');
    try {
        const res = await fetch('/api/public/asset-lookup?asset_tag=' + encodeURIComponent(tag));
        const data = await res.json();
        if (res.ok && data.id) {
            location.href = '/scan/' + data.id;
        } else {
            statusEl.textContent = '未找到标签号「' + tag + '」对应的资产，请检查编号是否正确';
            statusEl.style.color = 'var(--danger)';
        }
    } catch(e) {
        statusEl.textContent = '网络请求失败，请检查网络后重试';
        statusEl.style.color = 'var(--danger)';
    }
}

async function searchByTag() {
    const tag = document.getElementById('manualTag').value.trim();
    const statusEl = document.getElementById('scanStatus');
    if (!tag) {
        statusEl.textContent = '请输入资产标签号（如 PC-2026-0001）';
        statusEl.style.color = 'var(--warning)';
        return;
    }
    statusEl.textContent = '正在查询...';
    statusEl.style.color = '';
    await lookupByTag(tag);
}
</script>
{% endblock %}
